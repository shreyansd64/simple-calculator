<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .operation-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .op-btn {
            padding: 15px;
            font-size: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .op-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .op-btn.active {
            background: #764ba2;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        
        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .calculate-btn:hover {
            transform: scale(1.05);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.5s;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result h2 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .result p {
            color: #333;
            font-size: 18px;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Simple Calculator</h1>
        
        <div class="input-group">
            <label for="num1">First Number</label>
            <input type="number" id="num1" placeholder="Enter first number" step="any">
        </div>
        
        <div class="input-group">
            <label for="num2">Second Number</label>
            <input type="number" id="num2" placeholder="Enter second number" step="any">
        </div>
        
        <div class="input-group">
            <label>Select Operation</label>
            <div class="operation-buttons">
                <button class="op-btn" onclick="selectOperation('+', this)">+</button>
                <button class="op-btn" onclick="selectOperation('-', this)">−</button>
                <button class="op-btn" onclick="selectOperation('*', this)">×</button>
                <button class="op-btn" onclick="selectOperation('/', this)">÷</button>
            </div>
        </div>
        
        <button class="calculate-btn" onclick="calculate()">Calculate</button>
        
        <div class="result" id="result">
            <h2>Result</h2>
            <p id="result-text"></p>
        </div>
    </div>

    <script>
        let selectedOperation = '';
        
        function selectOperation(op, btn) {
            selectedOperation = op;
            
            // Remove active class from all buttons
            document.querySelectorAll('.op-btn').forEach(b => {
                b.classList.remove('active');
            });
            
            // Add active class to clicked button
            btn.classList.add('active');
        }
        
        function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('result-text');
            
            // Validation
            if (isNaN(num1) || isNaN(num2)) {
                resultDiv.classList.add('show', 'error');
                resultDiv.classList.remove('error');
                resultText.textContent = '⚠️ Please enter valid numbers!';
                setTimeout(() => resultDiv.classList.add('error'), 10);
                return;
            }
            
            if (!selectedOperation) {
                resultDiv.classList.add('show', 'error');
                resultDiv.classList.remove('error');
                resultText.textContent = '⚠️ Please select an operation!';
                setTimeout(() => resultDiv.classList.add('error'), 10);
                return;
            }
            
            let result;
            let operationSymbol = selectedOperation;
            
            switch(selectedOperation) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    operationSymbol = '×';
                    break;
                case '/':
                    if (num2 === 0) {
                        resultDiv.classList.add('show', 'error');
                        resultDiv.classList.remove('error');
                        resultText.textContent = '⚠️ Cannot divide by zero!';
                        setTimeout(() => resultDiv.classList.add('error'), 10);
                        return;
                    }
                    result = num1 / num2;
                    operationSymbol = '÷';
                    break;
            }
            
            // Show result
            resultDiv.classList.remove('error');
            resultDiv.classList.add('show');
            resultText.textContent = `${num1} ${operationSymbol} ${num2} = ${result}`;
        }
        
        // Allow Enter key to calculate
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
